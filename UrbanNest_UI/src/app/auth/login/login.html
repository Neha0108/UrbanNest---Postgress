<div class="page-shell auth-hero">
  <div class="auth-card login-card glass-card animated-entry">

    <header class="section-header">
      <p class="eyebrow">Welcome back</p>
      <h1 class="section-title">Sign in to Urban Nest</h1>
      <p class="body-copy">Access your curated wardrobe, favorites, and order history in a calm, premium space.</p>
    </header>

    <!--  Reactive Form Binding -->
    <form [formGroup]="loginForm" (ngSubmit)="submit()">

      <!-- Email -->
      <div class="mb-3 text-start">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          placeholder="Enter your email"
          formControlName="UserEmail"
        />

        <!-- optional error -->
        <small class="text-danger" *ngIf="loginForm.get('UserEmail')?.touched && loginForm.get('UserEmail')?.invalid">
          Please enter a valid email
        </small>
      </div>

      <!-- Password -->
      <div class="mb-4 text-start">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          placeholder="Enter your password"
          formControlName="UserPassword"
        />

        <!-- optional error -->
        <small class="text-danger" *ngIf="loginForm.get('UserPassword')?.touched && loginForm.get('UserPassword')?.invalid">
          Password is required
        </small>
      </div>

      <!-- Login Button -->
      <button
        class="btn btn-primary w-100 login-btn"
        type="submit"
        [disabled]="loginForm.invalid"
      >
        Sign In
      </button>

    </form>

    <!-- error from backend -->
    <p class="text-danger mt-3" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

    <p class="small-note">
      New here? <a routerLink="/register">Click here to register</a>
    </p>

  </div>
</div>
