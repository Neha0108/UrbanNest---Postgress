<div class="chatbot-wrapper">

  <button class="chatbot-fab" (click)="toggle()" aria-label="Open support chat">
    <span *ngIf="!isOpen()">💬</span>
    <span *ngIf="isOpen()">✕</span>
  </button>

  <div class="chatbot-panel" *ngIf="isOpen()">

    <div class="chatbot-header">
      <span>Urban Nest Support</span>
    </div>

    <div class="chatbot-messages" #messagesContainer>
      <div *ngFor="let msg of messages()" class="chatbot-bubble"
        [ngClass]="msg.from === 'user' ? 'bubble-user' : 'bubble-bot'">

        <div>{{ msg.text }}</div>

        <div *ngIf="msg.products?.length" class="product-cards-row">

          <div *ngFor="let card of msg.products" class="chat-product-card">

            <img [src]="imageUrl(card)" [alt]="card.productName">

            <div class="chat-product-info">
              <h4 class="chat-product-name">{{ card.productName }}</h4>
              <p class="chat-product-price">₹{{ card.productPrice }}</p>
            </div>

            <button class = "chat-product-actions" (click)="viewProduct(card)">
              View Details
              </button>

            <button class="chat-product-actions" (click)="addToCart(card)">
              Add To Cart
            </button>

          </div>

        </div>
      </div>

      <div class="chatbot-bubble bubble-bot" *ngIf="sending()">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </div>

    <div class="chatbot-input-row">
      <input [(ngModel)]="draft" (keydown.enter)="send()" placeholder="Ask about your order..."
        [disabled]="sending()" />
      <button (click)="send()" [disabled]="sending() || !draft.trim()">➤</button>
    </div>

  </div>

</div>
