<div class="main-content">
    <div class="container mt-4">

        <!-- Unified Filter Bar -->
        <div class="filters-container">
            <div class="filter-section">
                <span class="filter-label">Category</span>
                <div class="category-navbar">
                    <button class="category-item" *ngFor="let cat of categories" (click)="filterByCategory(cat)"
                        [class.active]="selectedCategory === cat">
                        {{ cat }}
                    </button>
                </div>
            </div>

            <div class="filter-divider"></div>

            <div class="filter-section">
                <span class="filter-label">Price Range</span>
                <div class="price-controls">
                    <div class="price-input-group">
                        <input
                            type="number"
                            id="minPrice"
                            [(ngModel)]="minPrice"
                            (change)="applyFilter()"
                            placeholder="Min"
                            class="price-input"
                            [max]="maxPrice || maxPriceAvailable">
                    </div>

                    <div class="price-separator">–</div>

                    <div class="price-input-group">
                        <input
                            type="number"
                            id="maxPrice"
                            [(ngModel)]="maxPrice"
                            (change)="applyFilter()"
                            placeholder="Max"
                            class="price-input"
                            [min]="minPrice || 0">
                    </div>

                    <button
                        *ngIf="minPrice !== null || maxPrice !== null"
                        (click)="resetPriceFilter()"
                        class="reset-filter-btn">
                        ✕
                    </button>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4" *ngFor="let item of filteredProducts; trackBy: trackById">

                <div class="product-card">

                    <div *ngIf="item.imagepath" class="img-wrapper">
                        <div id="carousel{{item.productId}}" class="carousel slide" data-bs-ride="carousel">
                            <div class="carousel-inner">
                                <div class="carousel-indicators">
                                    <button *ngFor="let img of item.imagepath; let i = index" type="button"
                                        [attr.data-bs-target]="'#carousel' + item.productId" [attr.data-bs-slide-to]="i"
                                        [class.active]="i === 0"></button>
                                </div>
                                <div *ngFor="let img of item.imagepath; let i = index" class="carousel-item"
                                    [class.active]="i === 0">
                                    <img [src]="'http://localhost:5146' + img" class="d-block w-100 product-img" />
                                </div>
                            </div>

                            <div class="product-info">
                                <span class="product-category">
                                    {{ item.CategoryName }}
                                </span>

                                <h5 class="product-title">
                                    {{ item.productName }}
                                </h5>

                                <p class="product-desc">
                                    {{ item.productDescription }}
                                </p>

                                <div class="product-meta">
                                    <span>₹ {{ item.productPrice }}</span>
                                    <span class="stock">{{ item.stock }} in stock</span>
                                </div>

                                <div class="product-actions">

                                    <button class="wishlist-btn disabled-btn" (click)="showAuthMessage()">
                                        ♥ Wishlist
                                    </button>

                                    <button class="cart-btn disabled-btn" (click)="showAuthMessage()">
                                        🛒 Add to Cart
                                    </button>

                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>

            <div *ngIf="filteredProducts.length === 0" class="no-products-message">
                <p>No products found matching your filters.</p>
            </div>
        </div>
