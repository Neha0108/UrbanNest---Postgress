<div class="price-section">
  <h2 class="section-title">Shop By Price</h2>
  <div class="price-grid">
    <div
  class="price-card"
  *ngFor="let item of priceRanges"
  (click)="filterByPrice(item.value,item.category)">
      <div class="price-badge">{{ item.label }}</div>

      <img
        [src]="item.image"
        [alt]="item.label"
      />

      <div class="price-title">
        {{ item.title }}
      </div>
    </div>
  </div>
</div>
